# yaml-language-server: $schema=../../packages/protocol/schema/mctest-stepfile.schema.json
name: regions-open-testregion
# RequiredCapabilities (subset of the canonical capability keys).
requires:
  command: true
  containerGui: true
target: ${matrix} # filled by the mc-test.yml row selected with --target
steps:
  - join: { host: localhost, port: 25565, username: Tester }
  - command: "or" # runs /or
  - waitForScreen: { titleContains: "OpenRegions" }
  - click: { label: "Regions" }
  - click: { label: "TestRegion" }
  - assertChat: { contains: "Region loaded" }
  # The server-truth half. With the server-bukkit agent co-selected (the target's
  # `agents: [ server-bukkit ]`), this RUNS against real plugin state — asserting
  # the region truly exists, not just that chat said so. With no agent it honestly
  # SKIPS with unmet:[pluginState] (the M2 behavior is preserved).
  - assertPluginState:
      requires: { pluginState: true }
      plugin: "OpenRegions"
      query: "regions.exists"
      args: { name: "TestRegion" }
      expect: true
