# mc-test client agent (NeoForge) manifest — NeoForge 1.20.5+ format (META-INF/neoforge.mods.toml).
#
# Thin client shim for the mc-test in-process driver: hosts an MCTP WebSocket server and exposes the
# client's Screen/widget tree, keyboard, and framebuffer as MCTP primitives. All wire logic lives in
# io.mctest:mc-test-agent-core; this mod only supplies the entrypoint (@Mod McTestClientMod) and the
# Mojmap-mapped ClientBridge (mappings/Names.java). NeoForge mappings are OFFICIAL Mojang (Mojmap), so
# there is no mappings dependency — only this one quarantined file carries the per-version tax.

# NeoGradle stamps ${...} placeholders from build.gradle.kts at processResources time.
modLoader = "javafml"
loaderVersion = "${loaderVersionRange}"
license = "Apache-2.0"
issueTrackerURL = "https://github.com/mc-test/mc-test/issues"

[[mods]]
modId = "mc-test-client-neoforge"
version = "${version}"
displayName = "mc-test client agent (NeoForge)"
authors = "mc-test"
# CLIENT-side mod: hosts an MCTP server and drives the real client UI. The @Mod is dist = CLIENT and the
# wiring runs on FMLClientSetupEvent, so it is inert on a dedicated server.
displayTest = "IGNORE_ALL_VERSION"
description = '''
Thin NeoForge client shim for the mc-test in-process driver: hosts an MCTP WebSocket server and exposes \
the client's Screen/widget tree, keyboard, and framebuffer as MCTP primitives. All wire logic lives in \
io.mctest:mc-test-agent-core; this mod only supplies the entrypoint and the Mojmap-mapped ClientBridge \
(mappings/Names.java).
'''

# Depend on NeoForge (the loader) and Minecraft, pinned to the build's (loader × MC) line.
[[dependencies.mc-test-client-neoforge]]
modId = "neoforge"
type = "required"
versionRange = "${neoVersionRange}"
ordering = "NONE"
side = "CLIENT"

[[dependencies.mc-test-client-neoforge]]
modId = "minecraft"
type = "required"
versionRange = "${minecraftVersionRange}"
ordering = "NONE"
side = "CLIENT"
