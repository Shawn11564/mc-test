# mc-test.yml — the canonical "regions" (loader × version) matrix.
# Run one target:   npx mc-test run examples/regions/regions.mctest.yml --target paper-1.20.4
# Run the matrix:   npx mc-test run examples/regions/regions.mctest.yml --target all
#                   (aggregates one JUnit + prints the (test × target) skip matrix)
#
# This is the M5 fan-out (ROADMAP §6.2/§6.3): the SAME authored test runs across the
# whole matrix and each cell is GREEN or HONESTLY SKIPPED. Only the Paper/headless
# rows are runnable in this repo's offline CI (M2/M3); the inprocess (rendered-client)
# rows and their loader agents (client-fabric/forge/neoforge + server-fabric) are
# ACCEPTANCE-ONLY (need a rendered client under a display + the Loom/Forge/NeoForge
# agent jars). The pixel/OCR driver (driver: pixel) is the universal LAST RESORT,
# selected only when no structural driver fits. See mc-test.example.yml for the
# fuller multi-loader matrix.
version: 1

provision:
  eulaAccepted: true # You accept Mojang's EULA by setting this; required to boot.
  bindHost: 127.0.0.1 # Loopback only — offline-mode servers must not be public.
  portRange: [25700, 25899]
  cacheDir: ~/.mc-test/cache
  workDir: .mc-test/run

worlds:
  regions-world:
    # Empty snapshot ⇒ Paper generates a fast superflat world (the GUI/chat test
    # does not depend on terrain). The copy-per-test mechanism still runs.
    snapshot: { path: ./examples/regions/world-snapshot }
    levelName: world

targets:
  - id: paper-1.20.4
    loader: paper
    mc: "1.20.4"
    driver: headless # Mineflayer bot — server-driven container GUIs, chat, commands.
    server: { paper: { project: paper, version: "1.20.4", build: latest } }
    plugins:
      - { path: ./examples/regions/plugin/target/regions-plugin.jar, as: regions.jar }
    # Co-select the Bukkit server agent (M3): dropped into plugins/ on a second
    # MCTP port, it answers the truth/fixture/player half so the canonical
    # assertPluginState RUNS (not skips) once the agent jar is built.
    agents: [ server-bukkit ]
    world: { ref: regions-world }

  # OLD-VERSION headless row (ROADMAP §6.2/§8.4): the SAME test on MC 1.8.9. The headless
  # Mineflayer bot speaks 1.8.9 NATIVELY (its mcVersionRange spans >=1.8), so it connects
  # DIRECTLY — no proxy needed for an in-range version. The real blocker is the server jar:
  # the PaperMC fill API has no 1.8.9 build, so with `server: { paper: ... }` below this row
  # honestly SKIPS `UNSUPPORTED_TARGET`. To actually RUN it, point `server` at a plugin-capable
  # Spigot/legacy 1.8.x jar via `{ url | path, sha256 }` (a real boot also needs a Java 8/11
  # toolchain — 1.8.x servers do not run on modern JDKs). `via: true` is advisory now: it only
  # forces a `VIA_BRIDGE_UNAVAILABLE` skip if `mc` were OUTSIDE the bot's native range (which
  # would need ViaProxy — a deferred v2 follow-on).
  - id: paper-1.8.9
    loader: paper
    mc: "1.8.9"
    driver: headless
    via: true # advisory; 1.8.9 is in-range so the bot connects natively (no proxy)
    # Paper has no 1.8.9 build → honest UNSUPPORTED_TARGET skip. Swap for a plugin-capable
    # Spigot 1.8.x jar to run: server: { url: <jar-url>, sha256: <hex> }
    server: { paper: { project: paper, version: "1.8.9", build: latest } }
    plugins:
      - { path: ./examples/regions/plugin/target/regions-plugin.jar, as: regions.jar }
    agents: [ server-bukkit ]
    world: { ref: regions-world }

  # RUNNABLE old-version row (v2): the counterpart to paper-1.8.9 above. Spigot 1.8.8 (the 1.8.x
  # BuildTools rev — Spigot has no 1.8.9 rev) is BUILT from source with BuildTools (the PaperMC fill
  # API can't serve 1.8.x) and booted under a Java 8 toolchain the provisioner fetches automatically
  # (multi-JDK). The headless bot speaks 1.8.8 natively — no proxy. The one-time BuildTools build
  # needs `git` + network (cached after). NOTE: a fully green regions run also needs the regions
  # plugin + server-bukkit agent to load on the 1.8 Bukkit API.
  - id: spigot-1.8.8
    loader: spigot
    mc: "1.8.8"
    driver: headless
    server: { spigot: { version: "1.8.8" } }
    plugins:
      - { path: ./examples/regions/plugin/target/regions-plugin.jar, as: regions.jar }
    agents: [ server-bukkit ]
    world: { ref: regions-world }

  # F3 (M4) RENDERED-CLIENT ROW. This target drives the CLIENT-GUI variant
  # (examples/regions/regions.clientgui.mctest.yml) against the mod SUT's real client
  # Screens — the case the headless bot provably cannot see. It needs (a) a built client
  # mod jar + the client-fabric agent jar and (b) a rendered client under a display, so it
  # runs in a GL-capable CI job (Xvfb + Mesa/llvmpipe) or a desktop runner — NOT this repo's
  # plain offline CI. The in-process driver launches the rendered client; the Paper server
  # below is both the connect target AND the host of the server-truth agent (the SUT is a
  # client-side mod, so a vanilla/Paper server suffices; a Fabric/vanilla server source via
  # `mojang:` is M5 — the provisioner currently boots Paper). Because the server is Paper,
  # the server-truth half is the BUKKIT agent `server-bukkit` (M3), not server-fabric (that
  # is for a Fabric server — F4/M5). clientScreens-gated steps run here; on the headless paper
  # row above, the same suite honestly SKIPS (unmet:["clientScreens"]).
  - id: fabric-1.21-client
    loader: fabric
    mc: "1.21.1"
    driver: inprocess # Rendered client agent — the ONLY driver that sees client Screens.
    server: { paper: { project: paper, version: "1.21.1", build: latest } }
    # The server-side regions PLUGIN (dropped into plugins/) so assertPluginState has real
    # state to query via the Bukkit agent. The client SUT mod stays under `mods:` below.
    plugins:
      - { path: ./examples/regions/plugin/target/regions-plugin.jar, as: regions.jar }
    mods:
      - { path: ./examples/regions/mod-fabric/build/libs/openregions-fabric.jar, as: regions.jar }
    display: xvfb # Linux CI headless surface; "desktop" on a windowed runner.
    # The client-fabric agent (Yarn) is injected into the rendered client by the in-process
    # driver; the BUKKIT server agent is co-selected (the server is Paper) so the canonical
    # assertPluginState RUNS (not skips). The client/SUT-mod jars are Loom-built.
    agents: [ client-fabric, server-bukkit ]
    world: { ref: regions-world }

  # F4 / M5 FAN-OUT. The NeoForge twin of the fabric client row: the SAME unchanged test,
  # driven against the real client Screens via the in-process driver + the client-neoforge
  # agent (Mojmap mappings). The server is Paper, so the truth half is the BUKKIT agent
  # `server-bukkit` (M3) — same as the fabric row. Differs from that row ONLY by
  # loader/loaderVersion/client-agent — proving "add a loader = one new mappings/Names.java +
  # a matrix row" (ROADMAP §6.3). NeoForge/Forge use the in-process driver's MODULAR launch:
  # implemented + pure parts unit-tested, the live boot is CI-GATED behind
  # MC_TEST_RENDERED_LOADERS=neoforge (a GL-capable host with the NeoGradle-built agent + the
  # NeoForge build of the SUT mod, examples/regions/mod-neoforge). Without that opt-in this row
  # HONEST-SKIPS (UNSUPPORTED_TARGET — never a false green); the no-boot fan-out equivalent is m5.test.ts.
  - id: neoforge-1.21-client
    loader: neoforge
    mc: "1.21.1"
    loaderVersion: "21.1.66" # the NeoGradle shim's pinned NeoForge version (client agent + SUT mod build)
    driver: inprocess
    server: { paper: { project: paper, version: "1.21.1", build: latest } }
    # Server-side regions PLUGIN so assertPluginState resolves against the Bukkit agent.
    plugins:
      - { path: ./examples/regions/plugin/target/regions-plugin.jar, as: regions.jar }
    mods:
      # The NeoForge build of the OpenRegions SUT (examples/regions/mod-neoforge), MC 1.21.1.
      - { path: ./examples/regions/mod-neoforge/build/libs/openregions-neoforge.jar, as: regions.jar }
    display: xvfb
    agents: [ client-neoforge, server-bukkit ]
    world: { ref: regions-world }

  # F4 / M5 FAN-OUT. The Forge twin (client-forge, MCP-SRG mappings) — the third loader on the
  # inprocess axis, completing fabric + neoforge + forge. Identical to the rows above except
  # loader/loaderVersion/mc/client-agent, which is exactly the "add a loader = one Names.java +
  # one yml row" promise: the Forge shim pins MC 1.20.1 / Forge 47.3.39 (ForgeGradle build).
  # Same modular-launch posture as neoforge: HONEST-SKIPS unless opted in via
  # MC_TEST_RENDERED_LOADERS=forge on a GL-capable host (with the ForgeGradle-built agent + the
  # Forge build of the SUT mod, examples/regions/mod-forge). The server is Paper 1.20.1 so the truth
  # half is server-bukkit.
  - id: forge-1.20.1-client
    loader: forge
    mc: "1.20.1"
    loaderVersion: "47.3.39" # the ForgeGradle shim's pinned Forge version (47.2.0 does not exist)
    driver: inprocess
    server: { paper: { project: paper, version: "1.20.1", build: latest } }
    plugins:
      - { path: ./examples/regions/plugin/target/regions-plugin.jar, as: regions.jar }
    mods:
      # The Forge build of the OpenRegions SUT (examples/regions/mod-forge), MC 1.20.1.
      - { path: ./examples/regions/mod-forge/build/libs/openregions-forge.jar, as: regions.jar }
    display: xvfb
    agents: [ client-forge, server-bukkit ]
    world: { ref: regions-world }

  # ───────────────────────────── F5: MODDED SERVERS ─────────────────────────────
  # Test SERVER-SIDE mods on a real Fabric/Forge/NeoForge DEDICATED SERVER (no display — GL is
  # only for rendered clients, so these boot in plain CI). Each row boots the modded server,
  # installs a REAL third-party mod downloaded from Modrinth (FerriteCore, id "ferritecore") +
  # the server-* truth agent into mods/, and the canonical `regions.modloaded.mctest.yml` test
  # asserts over MCTP that the loader actually loaded the mod (`driver: server` → a
  # server-truth-only session, NO player join — the only way to assert on Forge/NeoForge, whose
  # FML handshake a Mineflayer bot cannot complete). `expectMods` adds the secondary boot-log
  # signal. These need network + a JDK (+ the acceptance-only server-* agent jars), so they run
  # in the e2e lane (tests/e2e/modded-server.matrix.yml); without a built agent jar the
  # server-truth steps HONEST-SKIP (NO_SERVER_AGENT), never a false green.

  - id: fabric-server-1.21
    loader: fabric
    mc: "1.21.1"
    loaderVersion: "0.19.3" # Fabric loader (stable for 1.21.1); the launcher is fetched from the meta API
    driver: server # server-truth-only (mod.loaded); a bot COULD also join a Fabric server, but we assert via the agent
    mods:
      # The SUT: a real mod downloaded from Modrinth — FerriteCore 7.0.3 for Fabric 1.21.1 (verified version id).
      - { modrinth: { project: ferrite-core, version: sOzRw3CG }, as: ferritecore.jar }
      # Fabric API — the server-fabric agent depends on it (newest for 1.21.1; the resolved id is logged to pin).
      - { modrinth: { project: fabric-api, loader: fabric, gameVersion: "1.21.1" }, as: fabric-api.jar }
    agents: [ server-fabric ] # the Fabric server-mod truth agent (acceptance-only Loom build) → mods/
    expectMods: [ ferritecore ] # boot-log gate: fail MOD_NOT_LOADED if the loader didn't load it
    world: { ref: regions-world }

  - id: neoforge-server-1.21
    loader: neoforge
    mc: "1.21.1"
    loaderVersion: "21.1.234" # NeoForge installer version (verified to exist on the NeoForged maven)
    driver: server
    mods:
      # FerriteCore 7.0.3 for NeoForge 1.21.1 (verified Modrinth version id).
      - { modrinth: { project: ferrite-core, version: x7kQWVju }, as: ferritecore.jar }
    agents: [ server-neoforge ] # NeoForge server-mod truth agent (acceptance-only NeoGradle build) → mods/
    expectMods: [ ferritecore ]
    world: { ref: regions-world }

  - id: forge-server-1.20.1
    loader: forge
    mc: "1.20.1"
    loaderVersion: "47.3.39" # Forge installer version (47.2.0 does NOT exist; 47.3.39 verified on the Forge maven)
    driver: server
    mods:
      # FerriteCore 6.0.1 for Forge 1.20.1 (verified Modrinth version id).
      - { modrinth: { project: ferrite-core, version: DG5Fn9Sz }, as: ferritecore.jar }
    agents: [ server-forge ] # Forge server-mod truth agent (acceptance-only ForgeGradle build) → mods/
    expectMods: [ ferritecore ]
    world: { ref: regions-world }
