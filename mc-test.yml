# mc-test.yml — the canonical "regions" (loader × version) matrix.
# Run one target:   npx mc-test run examples/regions/regions.mctest.yml --target paper-1.20.4
# Run the matrix:   npx mc-test run examples/regions/regions.mctest.yml --target all
#                   (aggregates one JUnit + prints the (test × target) skip matrix)
#
# This is the M5 fan-out (ROADMAP §6.2/§6.3): the SAME authored test runs across the
# whole matrix and each cell is GREEN or HONESTLY SKIPPED. Only the Paper/headless
# rows are runnable in this repo's offline CI (M2/M3); the inprocess (rendered-client)
# rows and their loader agents (client-fabric/forge/neoforge + server-fabric) are
# ACCEPTANCE-ONLY (need a rendered client under a display + the Loom/Forge/NeoForge
# agent jars). The pixel/OCR driver (driver: pixel) is the universal LAST RESORT,
# selected only when no structural driver fits. See mc-test.example.yml for the
# fuller multi-loader matrix.
version: 1

provision:
  eulaAccepted: true # You accept Mojang's EULA by setting this; required to boot.
  bindHost: 127.0.0.1 # Loopback only — offline-mode servers must not be public.
  portRange: [25700, 25899]
  cacheDir: ~/.mc-test/cache
  workDir: .mc-test/run

worlds:
  regions-world:
    # Empty snapshot ⇒ Paper generates a fast superflat world (the GUI/chat test
    # does not depend on terrain). The copy-per-test mechanism still runs.
    snapshot: { path: ./examples/regions/world-snapshot }
    levelName: world

targets:
  - id: paper-1.20.4
    loader: paper
    mc: "1.20.4"
    driver: headless # Mineflayer bot — server-driven container GUIs, chat, commands.
    server: { paper: { project: paper, version: "1.20.4", build: latest } }
    plugins:
      - { path: ./examples/regions/plugin/target/regions-plugin.jar, as: regions.jar }
    # Co-select the Bukkit server agent (M3): dropped into plugins/ on a second
    # MCTP port, it answers the truth/fixture/player half so the canonical
    # assertPluginState RUNS (not skips) once the agent jar is built.
    agents: [ server-bukkit ]
    world: { ref: regions-world }

  # OLD-VERSION headless row (ROADMAP §6.2/§8.4): the SAME test on MC 1.8.9. The headless
  # Mineflayer bot speaks 1.8.9 NATIVELY (its mcVersionRange spans >=1.8), so it connects
  # DIRECTLY — no proxy needed for an in-range version. The real blocker is the server jar:
  # the PaperMC fill API has no 1.8.9 build, so with `server: { paper: ... }` below this row
  # honestly SKIPS `UNSUPPORTED_TARGET`. To actually RUN it, point `server` at a plugin-capable
  # Spigot/legacy 1.8.x jar via `{ url | path, sha256 }` (a real boot also needs a Java 8/11
  # toolchain — 1.8.x servers do not run on modern JDKs). `via: true` is advisory now: it only
  # forces a `VIA_BRIDGE_UNAVAILABLE` skip if `mc` were OUTSIDE the bot's native range (which
  # would need ViaProxy — a deferred v2 follow-on).
  - id: paper-1.8.9
    loader: paper
    mc: "1.8.9"
    driver: headless
    via: true # advisory; 1.8.9 is in-range so the bot connects natively (no proxy)
    # Paper has no 1.8.9 build → honest UNSUPPORTED_TARGET skip. Swap for a plugin-capable
    # Spigot 1.8.x jar to run: server: { url: <jar-url>, sha256: <hex> }
    server: { paper: { project: paper, version: "1.8.9", build: latest } }
    plugins:
      - { path: ./examples/regions/plugin/target/regions-plugin.jar, as: regions.jar }
    agents: [ server-bukkit ]
    world: { ref: regions-world }

  # RUNNABLE old-version row (v2): the counterpart to paper-1.8.9 above. Spigot 1.8.8 (the 1.8.x
  # BuildTools rev — Spigot has no 1.8.9 rev) is BUILT from source with BuildTools (the PaperMC fill
  # API can't serve 1.8.x) and booted under a Java 8 toolchain the provisioner fetches automatically
  # (multi-JDK). The headless bot speaks 1.8.8 natively — no proxy. The one-time BuildTools build
  # needs `git` + network (cached after). NOTE: a fully green regions run also needs the regions
  # plugin + server-bukkit agent to load on the 1.8 Bukkit API.
  - id: spigot-1.8.8
    loader: spigot
    mc: "1.8.8"
    driver: headless
    server: { spigot: { version: "1.8.8" } }
    plugins:
      - { path: ./examples/regions/plugin/target/regions-plugin.jar, as: regions.jar }
    agents: [ server-bukkit ]
    world: { ref: regions-world }

  # ACCEPTANCE-ONLY (M4). This target drives the CLIENT-GUI variant
  # (examples/regions/regions.clientgui.mctest.yml) against the mod SUT's real client
  # Screens — the case the headless bot provably cannot see. It needs (a) a built client
  # mod jar + the client-fabric agent jar and (b) a rendered client under a display
  # (Xvfb in CI / desktop runner), so it does NOT run in this repo's offline CI. The
  # in-process driver launches the rendered client; the Paper server below is just the
  # connect target (the SUT is a client-side mod, so a vanilla/Paper server suffices; a
  # Fabric/vanilla server source via `mojang:` is M5 — the provisioner currently boots Paper).
  # clientScreens-gated steps run; on the headless paper row above, the same suite honestly
  # SKIPS (unmet:["clientScreens"]).
  - id: fabric-1.21-client
    loader: fabric
    mc: "1.21.1"
    driver: inprocess # Rendered client agent — the ONLY driver that sees client Screens.
    server: { paper: { project: paper, version: "1.21.1", build: latest } }
    mods:
      - { path: ./examples/regions/mod/build/libs/openregions.jar, as: regions.jar }
    display: xvfb # Linux CI headless surface; "desktop" on a windowed runner.
    # M5: the client-fabric agent (Yarn) is injected into the rendered client by the
    # in-process driver; the server-fabric truth agent is co-selected so the canonical
    # assertPluginState RUNS (not skips). Both jars are Loom-built (acceptance-only).
    agents: [ client-fabric, server-fabric ]
    world: { ref: regions-world }

  # ACCEPTANCE-ONLY (M5 fan-out). The NeoForge twin of the fabric client row: the SAME
  # unchanged test, driven against the real client Screens via the in-process driver +
  # the client-neoforge agent (Mojmap mappings), with server-fabric for the truth half.
  # Differs from the fabric row ONLY by loader/agent — proving "add a loader = one new
  # mappings/Names.java + a matrix row" (ROADMAP §6.3). The Forge twin (client-forge,
  # MCP-SRG) is built identically and selectable via an analogous `loader: forge` row.
  - id: neoforge-1.21-client
    loader: neoforge
    mc: "1.21.1"
    driver: inprocess
    server: { paper: { project: paper, version: "1.21.1", build: latest } }
    mods:
      - { path: ./examples/regions/mod/build/libs/openregions.jar, as: regions.jar }
    display: xvfb
    agents: [ client-neoforge, server-fabric ]
    world: { ref: regions-world }
