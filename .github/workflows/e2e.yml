name: E2E (real Paper boot)

# Real-boot lane (F1): provisions real Paper servers and runs the committed E2E
# harness (tests/e2e/run-real-boot.mjs) for GENUINE pass/fail + artifacts. The
# harness asserts the "tester doesn't lie" triad + fixtures, not just exit codes:
#   - positive: regions test green INCLUDING assertPluginState (agent co-selected)
#   - honest-skip: no agent → assertPluginState SKIPPED (never a false pass)
#   - truth/UI-divergence: ghost region → assertPluginState RED while chat is green
#   - fixtures: createRegion→true / reset→false; spawnFakePlayer honestly skips
#   - flake budget: the positive run repeated N=3, all green (nondeterminism alarm)
# Off the per-PR path (manual + nightly) so PRs stay fast.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'   # nightly ~07:00 UTC

permissions:
  contents: read

jobs:
  paper-regions:
    name: Paper · regions (headless)
    runs-on: ubuntu-latest
    timeout-minutes: 45   # boots real Paper servers (incl. N=3 flake budget); cap a hung boot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.0'

      - run: npm ci
      - name: Build runner (dependency order)
        run: |
          npm run build -w @mc-test/protocol
          npm run build -w @mc-test/driver-headless
          npm run build -w @mc-test/driver-inprocess
          npm run build -w @mc-test/driver-pixel
          npm run build -w @mc-test/runner

      # M3 build sequence: publish the agent core SPI to mavenLocal (the SUT
      # compiles against it), then build the server-bukkit agent jar.
      - name: Build agent core + server-bukkit jar
        run: gradle -p agents :core:publishToMavenLocal :server-bukkit:jar

      # Build the regions SUT plugin (Maven).
      - name: Build regions plugin (SUT)
        run: mvn -B -f examples/regions/plugin/pom.xml package

      # The real boots: positive + both negative controls + fixtures + N=3 flake budget.
      # The harness asserts every outcome and exits non-zero on any regression.
      - name: Run real-boot E2E harness
        run: node tests/e2e/run-real-boot.mjs --flake=3

      - name: Upload report + retained failure instances
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mc-test-report
          path: |
            mc-test-report/
            .mc-test/run/
          if-no-files-found: ignore

  # Full F6 path: publish the plugin + agent core locally, then `gradle mcTest` on
  # the sample Paper plugin project — builds the SUT jar, boots an ephemeral server,
  # runs the regions test (incl. assertPluginState), writes JUnit.
  gradle-front-door:
    name: Gradle front door (gradle mcTest)
    runs-on: ubuntu-latest
    timeout-minutes: 45   # builds the SUT + boots an ephemeral Paper server via gradle mcTest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.0'

      - run: npm ci
      - name: Build runner (dependency order)
        run: |
          npm run build -w @mc-test/protocol
          npm run build -w @mc-test/driver-headless
          npm run build -w @mc-test/driver-inprocess
          npm run build -w @mc-test/driver-pixel
          npm run build -w @mc-test/runner

      # The SUT compiles against the agent-core SPI; the runner co-selects the agent jar.
      - name: Publish agent core + build server-bukkit jar
        run: gradle -p agents :core:publishToMavenLocal :server-bukkit:jar
      - name: Publish the mc-test-gradle plugin (mavenLocal)
        run: gradle -p gradle-plugin publishToMavenLocal

      - name: gradle mcTest (sample plugin project)
        run: gradle -p examples/regions/plugin-gradle mcTest

      - name: Upload Gradle front-door report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-front-door-report
          path: examples/regions/plugin-gradle/build/mc-test-report/
          if-no-files-found: ignore

  # F3 rendered-client lane: a REAL Fabric Minecraft client renders the SUT mod's client
  # Screen, driven over MCTP via the in-process driver, while a Paper server + the Bukkit
  # agent supply server truth. Runs the committed rendered-boot harness
  # (tests/e2e/run-rendered-boot.mjs) under a virtual display (Xvfb + Mesa/llvmpipe). This is
  # the heaviest lane: it boots a server AND launches a GL client, and the two Loom jars are
  # acceptance-only (Fabric Loom needs network + a Minecraft/Yarn download). `continue-on-error`
  # keeps it advisory — like the rest of this nightly/dispatch-only workflow — so a flaky GL
  # surface never blocks; the harness asserts REAL markers (whole-test SKIP on headless +
  # PASS with assertPluginState green on the rendered client) so it is never a false green.
  fabric-rendered-client:
    name: Fabric · regions client GUI (rendered, Xvfb)
    runs-on: ubuntu-latest
    timeout-minutes: 60   # boots a Paper server AND launches a rendered GL client; cap a hung boot
    continue-on-error: true   # heaviest/most-fragile lane (GL surface + acceptance-only Loom jars)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.0'

      # The rendered client is LWJGL/OpenGL: Xvfb provides the headless surface and
      # Mesa (libgl1-mesa-dri) + LIBGL_ALWAYS_SOFTWARE give software GL (llvmpipe), so
      # no GPU is needed. mesa-utils ships glxinfo for diagnostics.
      - name: Install display + software-GL stack
        run: sudo apt-get update && sudo apt-get install -y xvfb libgl1-mesa-dri mesa-utils

      - run: npm ci
      - name: Build runner (dependency order)
        run: |
          npm run build -w @mc-test/protocol
          npm run build -w @mc-test/driver-headless
          npm run build -w @mc-test/driver-inprocess
          npm run build -w @mc-test/driver-pixel
          npm run build -w @mc-test/runner

      # Server side: publish the agent-core SPI (the SUT compiles against it), build the
      # Bukkit truth agent jar, and build the server-side regions plugin (Maven).
      - name: Build agent core + server-bukkit jar
        run: gradle -p agents :core:publishToMavenLocal :server-bukkit:jar
      - name: Build regions plugin (server-side SUT)
        run: mvn -B -f examples/regions/plugin/pom.xml package

      # Client side (Loom, standalone projects with their own wrappers): the client-fabric
      # agent jar (agent-client-fabric.jar) the in-process driver injects, and the SUT's
      # client mod jar (openregions-fabric.jar). Both download Minecraft + Yarn at build time.
      # `build` also runs client-fabric's mapping-contract test (reflects over the real Yarn-remapped MC).
      - name: Build + test client-fabric agent (Loom)
        run: ./gradlew build
        working-directory: agents/client-fabric
      - name: Build regions client mod jar (Loom)
        run: ./gradlew build
        working-directory: examples/regions/mod-fabric

      # The rendered boot: honest-skip on headless + the positive rendered run (GUI flow +
      # assertPluginState) + screenshot artifact + flake budget, all under a virtual display.
      - name: Run rendered-client E2E harness (Xvfb)
        run: xvfb-run -a node tests/e2e/run-rendered-boot.mjs --flake=1

      - name: Upload report + screenshots + server/client logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mc-test-rendered-report
          path: |
            mc-test-report/
            .mc-test/run/
            **/*.png
          if-no-files-found: ignore

  # F4 multi-loader fan-out lane: the SAME unchanged test across the (loader × version)
  # matrix → ONE aggregated JUnit + a (test × target) skip matrix, run with per-target
  # PARALLELISM. Two parts:
  #   (1) the orchestration harness (tests/e2e/run-matrix-boot.mjs) — a DETERMINISTIC
  #       proof (no boot/GL/network) that the fan-out aggregates + honest-skips correctly
  #       (paper headless → clientScreens; forge/neoforge → CI-gated UNSUPPORTED_TARGET).
  #       This is a real gate.
  #   (2) the three loader shims actually BUILD (client-forge/ForgeGradle,
  #       client-neoforge/NeoGradle, server-fabric/Loom) — acceptance-only, heavy +
  #       network (download MC/Yarn/Forge/NeoForge), so each is continue-on-error.
  # The rendered GREEN forge/neoforge boots are gated behind MC_TEST_RENDERED_LOADERS on a
  # GL-capable host (the in-process driver's modular launch); fabric's rendered green is the
  # fabric-rendered-client lane above. nightly/dispatch only.
  multi-loader-matrix:
    name: Multi-loader · fan-out (matrix orchestration + shim builds)
    runs-on: ubuntu-latest
    timeout-minutes: 60   # the shim builds download MC/Yarn/Forge/NeoForge toolchains
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.0'

      - run: npm ci
      - name: Build runner (dependency order)
        run: |
          npm run build -w @mc-test/protocol
          npm run build -w @mc-test/driver-headless
          npm run build -w @mc-test/driver-inprocess
          npm run build -w @mc-test/driver-pixel
          npm run build -w @mc-test/runner

      # (1) The deterministic orchestration proof: aggregated JUnit + skip matrix +
      #     honest skips + per-target parallelism, across paper/forge/neoforge. No boot.
      - name: Run multi-loader matrix orchestration harness
        run: node tests/e2e/run-matrix-boot.mjs

      # (2) BUILD + TEST the three loader shims against their REAL remapped Minecraft. `./gradlew build`
      #     runs each shim's test suite (mapping-contract tests for the clients — they reflect over the
      #     real Yarn/MCP-SRG/Mojmap symbols mappings/Names.java depends on; pure-Java helper tests for
      #     server-fabric) AND compiles Names.java against the remapped MC, which is itself the strongest
      #     per-(loader × version) mapping check. They are standalone Loom/ForgeGradle/NeoGradle projects
      #     with their own committed Gradle 8.10.2 wrappers, each pulling the agent-core SPI from
      #     mavenLocal. Network-heavy (download MC/Yarn/Forge/NeoForge toolchains) → continue-on-error so
      #     a flaky download never blocks, while the tests/compile still run + report.
      - name: Publish agent core (mavenLocal) for the shims
        run: gradle -p agents :core:publishToMavenLocal
      - name: Build + test client-forge (ForgeGradle, vs remapped MC 1.20.1)
        continue-on-error: true
        run: ./gradlew build
        working-directory: agents/client-forge
      - name: Build + test client-neoforge (NeoGradle, vs Mojmap MC 1.21.1)
        continue-on-error: true
        run: ./gradlew build
        working-directory: agents/client-neoforge
      - name: Build + test server-fabric (Loom, vs Yarn MC 1.21.1)
        continue-on-error: true
        run: ./gradlew build
        working-directory: agents/server-fabric

      # The per-loader SUT mods (the same OpenRegions behavior built for Forge/NeoForge). These pair
      # with the client-forge/client-neoforge agents above in a rendered client. Like the shims they are
      # standalone, network-heavy (download MC/Forge/NeoForge) → continue-on-error compile checks here;
      # the rendered GREEN boot is gated behind MC_TEST_RENDERED_LOADERS on a GL host.
      - name: Build regions SUT mod (Forge, ForgeGradle MC 1.20.1)
        continue-on-error: true
        run: ./gradlew build
        working-directory: examples/regions/mod-forge
      - name: Build regions SUT mod (NeoForge, NeoGradle MC 1.21.1)
        continue-on-error: true
        run: ./gradlew build
        working-directory: examples/regions/mod-neoforge

      - name: Upload matrix report + built shim jars
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mc-test-matrix-report
          path: |
            mc-test-report/
            agents/client-forge/build/libs/*.jar
            agents/client-neoforge/build/libs/*.jar
            agents/server-fabric/build/libs/*.jar
            examples/regions/mod-forge/build/libs/*.jar
            examples/regions/mod-neoforge/build/libs/*.jar
          if-no-files-found: ignore

  # F5 modded-SERVER lane: boot a REAL Fabric/Forge/NeoForge DEDICATED SERVER (no display — a
  # server renders nothing), download a real third-party mod from Modrinth (FerriteCore), and
  # assert OVER MCTP that the loader actually loaded it — the cost-1 `server` driver + the
  # server-* truth agent answering `mod.loaded` in a server-truth-only session (NO player join,
  # the only way to assert on Forge/NeoForge whose FML handshake a Mineflayer bot cannot complete),
  # plus the boot-log mod-load signal. All three server-* truth agents (Loom / ForgeGradle /
  # NeoGradle) are VERIFIED to build + boot + answer `mod.loaded = true` (proven on a real machine);
  # each build stays `continue-on-error` only so a transient toolchain/network hiccup degrades to an
  # honest per-loader SKIP rather than failing the whole lane. Forge 1.20.1 builds + boots on Java 17
  # (set up below); NeoForge 1.21.1 + Fabric on Java 21. nightly/dispatch only.
  modded-server:
    name: Modded servers · mod.loaded (fabric/forge/neoforge)
    runs-on: ubuntu-latest
    timeout-minutes: 60   # downloads loaders + a real mod + boots modded servers (forge runs the installer)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      # Both JDKs: 21 is the default (NeoForge 1.21.1 + Fabric, and it also boots the Forge 1.20.1
      # SERVER fine — verified); 17 is only for BUILDING the Forge agent jar, whose ForgeGradle
      # toolchain targets Java 17. setup-java exports JAVA_HOME_17_X64 for that forge build step below.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.0'

      - run: npm ci
      - name: Build runner (dependency order)
        run: |
          npm run build -w @mc-test/protocol
          npm run build -w @mc-test/driver-headless
          npm run build -w @mc-test/driver-inprocess
          npm run build -w @mc-test/driver-pixel
          npm run build -w @mc-test/runner

      # Publish the agent-core SPI (the server-* agents shade/jarJar it), then build the three
      # server-side truth agents. All build + boot for real; `continue-on-error` only degrades a
      # transient toolchain/network failure to an honest per-loader skip in the harness below.
      # NeoForge nests no Gson/slf4j (the loader provides those modules — bundling them splits the
      # JPMS module graph at boot); Forge's shadowJar excludes them for the same reason.
      - name: Publish agent core (mavenLocal)
        run: gradle -p agents :core:publishToMavenLocal
      - name: Build server-fabric agent (Loom, Yarn MC 1.21.1, Java 21)
        continue-on-error: true
        run: ./gradlew build
        working-directory: agents/server-fabric
      - name: Build server-neoforge agent (NeoGradle, Mojmap MC 1.21.1, Java 21)
        continue-on-error: true
        run: ./gradlew build
        working-directory: agents/server-neoforge
      - name: Build server-forge agent (ForgeGradle, MC 1.20.1, Java 17)
        continue-on-error: true
        run: ./gradlew build
        working-directory: agents/server-forge
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}   # Forge 47.x targets Java 17

      # The real boots: each BUILT loader's modded server boots, downloads FerriteCore from
      # Modrinth into mods/, and asserts mod.loaded = true over MCTP (+ the boot-log signal);
      # plus the negative control (absent mod → RED). Honest-skips loaders whose agent didn't build.
      - name: Run modded-server E2E harness
        run: node tests/e2e/run-modded-server-boot.mjs

      - name: Upload modded-server report + server logs + built agent jars
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mc-test-modded-server-report
          path: |
            mc-test-report/
            .mc-test/run/
            agents/server-fabric/build/libs/*.jar
            agents/server-neoforge/build/libs/*.jar
            agents/server-forge/build/libs/*.jar
          if-no-files-found: ignore

  # ──────────────────────── Publish mc-test's OWN report.html ────────────────────────
  # mc-test publishes its own human report the SAME way the reusable consumer workflow
  # (mc-test-ci.yml) does for downstream projects — uploaded as an artifact (always) and
  # served on GitHub Pages (best-effort). Each lane above runs the canonical "regions"
  # tests in a different environment (headless Paper, rendered Fabric/Forge/NeoForge
  # clients, modded servers) and emits its own mc-test-report/report.html; this job
  # aggregates them into one Pages site with a landing index linking each lane's report.
  publish-report:
    name: Assemble self-test report site
    needs: [paper-regions, gradle-front-door, fabric-rendered-client, multi-loader-matrix, modded-server]
    if: always()
    runs-on: ubuntu-latest
    steps:
      # Pull every lane's uploaded report artifact (no `name` ⇒ all of them) into _artifacts/<name>/.
      - name: Download all E2E report artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Assemble Pages site (landing index + each lane's report)
        run: |
          set -euo pipefail
          mkdir -p site
          {
            echo '<!doctype html><html lang="en"><head><meta charset="utf-8">'
            echo '<meta name="viewport" content="width=device-width,initial-scale=1">'
            echo '<title>mc-test — self-test reports</title>'
            echo '<style>body{font-family:system-ui,-apple-system,sans-serif;max-width:760px;margin:3rem auto;padding:0 1rem;color:#111;line-height:1.5}h1{font-size:1.6rem;margin-bottom:.25rem}ul{line-height:2.2;padding-left:1.2rem}a{color:#2563eb;text-decoration:none}a:hover{text-decoration:underline}.meta{color:#666;font-size:.9rem}code{background:#f3f4f6;padding:.1rem .3rem;border-radius:4px}</style>'
            echo '</head><body>'
            echo '<h1>mc-test &mdash; self-test reports</h1>'
            echo '<p class="meta">mc-test running its own canonical &ldquo;regions&rdquo; tests across platforms. Generated by the E2E workflow; each entry links to that lane&rsquo;s <code>report.html</code>. Honest skips (a target with no built agent jar, an out-of-range version) stay green and show as skipped.</p>'
            echo '<ul>'
          } > site/index.html
          # $1 = artifact name, $2 = human label. Stage the lane's whole report dir (report.html +
          # junit/ + artifacts/ screenshots) under site/<name>/ and link it; note a missing one honestly.
          emit() {
            local rep
            rep=$(find "_artifacts/$1" -name report.html 2>/dev/null | head -1 || true)
            if [ -n "$rep" ]; then
              mkdir -p "site/$1"
              cp -r "$(dirname "$rep")/." "site/$1/"
              echo "<li><a href=\"$1/report.html\">$2</a></li>" >> site/index.html
            else
              echo "<li>$2 &mdash; <span class=\"meta\">no report (lane skipped or failed before producing one)</span></li>" >> site/index.html
            fi
          }
          emit mc-test-report               "Paper &middot; headless (regions)"
          emit mc-test-modded-server-report "Modded servers &middot; mod.loaded + world-truth (fabric/forge/neoforge)"
          emit mc-test-rendered-report      "Fabric &middot; rendered client GUI"
          emit mc-test-matrix-report        "Multi-loader matrix (fan-out)"
          emit gradle-front-door-report     "Gradle front door (gradle mcTest)"
          { echo '</ul></body></html>'; } >> site/index.html
          echo "Assembled Pages site:"; find site -maxdepth 2 \( -name report.html -o -name index.html \) | sort

      - name: Upload Pages artifact
        if: ${{ hashFiles('site/**') != '' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  # Best-effort Pages deploy (mirrors mc-test-ci.yml's publish job): serves the index + every
  # lane's report at the repo's Pages URL. continue-on-error so a repo that has not enabled Pages
  # (Settings → Pages → Source: "GitHub Actions") still gets the per-lane artifacts, not a red run.
  deploy-report:
    name: Publish report to GitHub Pages
    needs: publish-report
    if: ${{ always() && needs.publish-report.result == 'success' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pages: write
      id-token: write
    # One in-flight Pages deploy at a time; don't cancel a running publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
